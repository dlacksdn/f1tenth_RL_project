defaults:

  logdir: null
  traindir: null
  evaldir: null
  offline_traindir: ''
  offline_evaldir: ''
  seed: 0
  deterministic_run: False
  steps: 1e6
  parallel: False
  eval_every: 1e4
  eval_episode_num: 10
  log_every: 1e4
  reset_every: 0
  device: 'cuda:0'
  compile: True
  precision: 32
  debug: False
  video_pred_log: True

  # Environment
  task: 'dmc_walker_walk'
  size: [64, 64]
  envs: 1
  action_repeat: 2
  time_limit: 1000
  grayscale: False
  prefill: 2500
  reward_EMA: True

  # Model
  dyn_hidden: 512
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  dyn_rec_depth: 1
  dyn_mean_act: 'none'
  dyn_std_act: 'sigmoid2'
  dyn_min_std: 0.1
  grad_heads: ['decoder', 'reward', 'cont']
  units: 512
  act: 'SiLU'
  norm: True
  encoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, symlog_inputs: True}
  decoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, cnn_sigmoid: False, image_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'normal', entropy: 3e-4, unimix_ratio: 0.01, std: 'learned', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 0.0}
  reward_head:
    {layers: 2, dist: 'symlog_disc', loss_scale: 1.0, outscale: 0.0}
  cont_head:
    {layers: 2, loss_scale: 1.0, outscale: 1.0}
  dyn_scale: 0.5
  rep_scale: 0.1
  kl_free: 1.0
  weight_decay: 0.0
  unimix_ratio: 0.01
  initial: 'learned'

  # Training
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  pretrain: 100
  model_lr: 1e-4
  opt_eps: 1e-8
  grad_clip: 1000
  dataset_size: 1000000
  opt: 'adam'

  # Phase 5 Stage 2 fine-tune (planning/015 #21/#9). Defaults = no-op (Stage 1
  # resume / scratch 무영향). Stage 2서만 CLI override.
  warm_load_ckpt: ''         # #21: 비어있지 않으면(그리고 logdir/latest.pt 부재 시) 이 ckpt에서 world model weights만 warm load. actor/critic + 모든 optimizer는 fresh.
  warm_lr_scale: 1.0         # #21: warm-load 첫 시작에만 model/actor/value lr에 곱(R3: 0.5). resume엔 무영향.
  joint_replay_ratio: 0.0    # #9: >0이면 매 배치 element를 이 확률로 joint_replay_dir(Stage1)에서 샘플(나머지는 현 트랙). #31 미달 시 0.5.
  joint_replay_dir: ''       # #9: Stage1 train_eps 디렉토리(절대경로). joint_replay_ratio>0일 때만 사용.

  # Behavior.
  discount: 0.997
  discount_lambda: 0.95
  imag_horizon: 15
  imag_gradient: 'dynamics'
  imag_gradient_mix: 0.0
  eval_state_mean: False

  # Exploration
  expl_behavior: 'greedy'
  expl_until: 0
  expl_extr_scale: 0.0
  expl_intr_scale: 1.0
  disag_target: 'stoch'
  disag_log: True
  disag_models: 10
  disag_offset: 1
  disag_layers: 4
  disag_units: 400
  disag_action_cond: False

dmc_proprio:
  steps: 5e5
  action_repeat: 2
  envs: 4
  train_ratio: 512
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

dmc_vision:
  steps: 1e6
  action_repeat: 2
  envs: 4
  train_ratio: 512
  video_pred_log: true
  encoder: {mlp_keys: '$^', cnn_keys: 'image'}
  decoder: {mlp_keys: '$^', cnn_keys: 'image'}

crafter:
  task: crafter_reward
  step: 1e6
  action_repeat: 1
  envs: 1
  train_ratio: 512
  video_pred_log: true
  dyn_hidden: 1024
  dyn_deter: 4096
  units: 1024
  encoder: {mlp_keys: '$^', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  decoder: {mlp_keys: '$^', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  actor: {layers: 5, dist: 'onehot', std: 'none'}
  value: {layers: 5}
  reward_head: {layers: 5}
  cont_head: {layers: 5}
  imag_gradient: 'reinforce'

atari100k:
  steps: 4e5
  envs: 1
  action_repeat: 4
  train_ratio: 1024
  video_pred_log: true
  eval_episode_num: 100
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  stickey: False
  lives: unused
  noops: 30
  resize: opencv
  actions: needed
  time_limit: 108000

minecraft:
  task: minecraft_diamond
  step: 1e8
  parallel: True
  envs: 16
  # no eval
  eval_episode_num: 0
  eval_every: 1e4
  action_repeat: 1
  train_ratio: 16
  video_pred_log: true
  dyn_hidden: 1024
  dyn_deter: 4096
  units: 1024
  encoder: {mlp_keys: 'inventory|inventory_max|equipped|health|hunger|breath|obs_reward', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  decoder: {mlp_keys: 'inventory|inventory_max|equipped|health|hunger|breath', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  actor: {layers: 5, dist: 'onehot', std: 'none'}
  value: {layers: 5}
  reward_head: {layers: 5}
  cont_head: {layers: 5}
  imag_gradient: 'reinforce'
  break_speed: 100.0
  time_limit: 36000

memorymaze:
  steps: 1e8
  action_repeat: 2
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  task: 'memorymaze_9x9'

debug:
  debug: True
  pretrain: 1
  prefill: 1
  batch_size: 10
  batch_length: 20

f1tenth:
  # Phase 2-0 SKELETON (decision #22/#25; 007 fixed-HP fidelity §2-B; 008 snapshot).
  # The model / encoder-decoder / 12M + lidar_keys section is finalized in
  # Phase 2-3 (A9/A10), after ConvEncoder1D (2-1) and the MultiEncoder lidar
  # branch (2-2) land. Algorithm HPs (dyn_scale/kl_free/lr/train_ratio/...) are
  # left at `defaults` per 007 §2-A (no override).
  task: 'f1tenth_map_easy3'        # decision #25/#32: TRAIN on map_easy3 ONLY. Oschersleben is held-out (NEVER trained); zero-shot eval via separate eval config/CLI override only (planning/011).
  # --- episode / accounting (decision #22) ---
  action_repeat: 2                 # adapter owns the repeat loop; dreamer.py divides counters by this
  time_limit: 18000                # main: //action_repeat -> TimeLimit=9000 env-step = 180s @ 50/s
  steps: 5e5                       # v3 §2-3; //action_repeat in main. final budget pending A19 dry-run
  envs: 1
  parallel: False                  # Damy wrapper (parallel.py)
  prefill: 0                       # decision #23 (GapFollower collector is separate)
  # --- compute/memory profile (007 §2-B, 8GB) ---
  precision: 16                    # 8GB AMP
  compile: False                   # decision #26 (ConvEncoder1D dynamic padding)
  batch_size: 16                   # A19 dry-run 정정 (notes/dryrun_results.md): VRAM 3.3GB/8GB 여유 + Every(1024/512)=2 = dreamerv3 의도 replay ratio 복원(batch8은 매-step train=2배 over-training, 007 fixed-HP 위반). 단일500K 20.9h<24h PASS.
  batch_length: 64
  dataset_size: 200000             # F5-14 (+ LiDAR fp16 in Phase 3)
  # --- eval (decision #19) ---
  eval_episode_num: 20
  eval_state_mean: True
  video_pred_log: False            # decision #14 (vector-only obs; video_pred hardcodes image key)
  # --- A-1 snapshot (orchestration layer, .py 배선 완료; 사용자 결정 2026-05-22) ---
  # 트랙별 bin: map_easy3 실측 lap~8-13s → 1초폭/상한20s 촘촘.
  # Oschersleben(1바퀴 기준): 실측 eval 완주 lap 16~38s(예상 90-110s는 2바퀴 총시간 기준이었음) →
  #   2초폭으로 세분화(2026-05-23 변경). 좋은 policy 교체 손실 줄이려 bin 촘촘하게. 상한 110s 유지.
  snapshot_bin_width: {map_easy3: 1.0, oschersleben: 2.0}    # 트랙별 diversity bin 폭(초)
  snapshot_lap_max: {map_easy3: 20.0, oschersleben: 110.0}    # 트랙별 저장 상한 lap_time(초)
  snapshot_interval_keep: True     # eval_every마다 step_{N}k.pt full ckpt 별도 보존(A15, 덮어쓰기 X)
  # --- 12M model dims (Phase 2-3, A9/A10; v3 §2-3, decision #3). Algorithm HPs
  #     (dyn_scale/rep_scale/kl_free/lr/train_ratio/discount/...) stay at defaults
  #     per 007 §2-A (no override). Only size + modality interface differ. ---
  dyn_hidden: 256
  dyn_deter: 1024
  dyn_stoch: 32
  dyn_discrete: 16
  units: 256
  # --- encoder/decoder key routing (Phase 2-2, A8) + size (mlp_units/layers). ---
  encoder: {lidar_keys: 'lidar', mlp_keys: 'state', cnn_keys: '$^', mlp_units: 256, mlp_layers: 5, symlog_inputs: False}  # #15/#16
  decoder: {lidar_keys: 'lidar', mlp_keys: 'state', cnn_keys: '$^', mlp_units: 256, mlp_layers: 5, vector_dist: symlog_mse}
